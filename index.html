<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinatta | Premium Sleep Innovations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #faf8f6; /* نفس الخلفية البيضاء الدافئة والمريحة للوجو الجديد */
            color: #4a354f; /* درجة البنفسجي الغامق الهادي المستوحاة من اللوجو */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        .logo-container {
            margin-bottom: 40px;
        }
        /* تصميم يحاكي الفون والروح الخاصة باللوجو السكريبت المرفوع */
        .logo-text {
            font-family: 'Georgia', cursive, serif;
            font-size: 64px;
            font-weight: 700;
            font-style: italic;
            color: #58335c; 
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
        }
        .logo-text::after {
            content: '✦'; /* النجمة الرقيقة المميزة في نهاية اللوجو */
            font-size: 24px;
            position: absolute;
            top: 20px;
            right: -25px;
            color: #58335c;
        }
        h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            color: #332238;
        }
        p {
            font-size: 16px;
            color: #6e5d73;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .contact-box {
            background: #ffffff;
            border: 1px solid #e3deeb;
            padding: 18px 30px;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(88, 51, 92, 0.04);
        }
        .contact-box span {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9c8da0;
            margin-bottom: 6px;
        }
        .contact-box a {
            color: #58335c;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed #58335c;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }
        .contact-box a:hover {
            color: #7b4a80;
            border-bottom-color: #7b4a80;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="logo-text">rinatta</div>
        </div>

        <h1>Something innovative is awakening.</h1>
        <p>We are meticulously crafting an ecosystem engineered for ultimate relaxation and deep sleep. Our digital experience is coming soon.</p>

        <div class="contact-box">
            <span>Inquiries & Support</span>
            <a href="mailto:info@rinatta.com">info@rinatta.com</a>
        </div>
    </div>

</body>
</html>
